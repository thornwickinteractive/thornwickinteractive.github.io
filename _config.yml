# Site identity
title: Fold
description: Privacy policy and support for Fold, a cozy puzzle game.
author: Thornwick Interactive

# URL config
# If the repo is named `username.github.io`, leave both as-is.
# If the repo has any other name (e.g. `fold-site`), set baseurl to `/fold-site`.
url: https://thornwickinteractive.github.io
baseurl: "/thornwickinteractive"

# Build settings
theme: minima
markdown: kramdown
highlighter: rouge
permalink: pretty   # /privacy/ instead of /privacy.html

# Plugins enabled by GitHub Pages
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude development-only files from the published site
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - vendor
  - node_modules

# Default frontmatter for pages so each one gets a sensible <title>
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: page

# Footer config (minima theme uses these)
minima:
  social_links:
    email: thornwickinteractive@gmail.com
